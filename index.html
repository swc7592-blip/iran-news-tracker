<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>이란 전쟁 실시간 뉴스</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: 'Noto Sans KR', sans-serif;
        }
        .news-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }
        .modal-backdrop {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .loading-pulse {
            animation: pulse 2s ease-in-out infinite;
        }
        .badge {
            font-size: 0.65rem;
            padding: 2px 6px;
        }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen">
    <!-- Header -->
    <header class="bg-gray-800 border-b border-gray-700 sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 py-4">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-red-600 rounded-lg flex items-center justify-center">
                        <span class="text-white font-bold text-lg">📰</span>
                    </div>
                    <div>
                        <h1 class="text-xl font-bold text-white">이란 전쟁 실시간 뉴스</h1>
                        <p class="text-xs text-gray-400">Brave Search API 기반</p>
                    </div>
                </div>
                <div class="flex items-center gap-4">
                    <div class="text-right text-sm">
                        <p class="text-gray-400">마지막 업데이트</p>
                        <p id="lastUpdate" class="text-white font-medium">-</p>
                    </div>
                    <button id="refreshBtn" onclick="fetchNews()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg font-medium transition-all flex items-center gap-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
                        </svg>
                        새로고침
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- Status Bar -->
    <div id="statusBar" class="bg-gray-800 border-b border-gray-700 px-4 py-2">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-2 text-sm">
                <span id="statusIcon" class="text-gray-400">●</span>
                <span id="statusText" class="text-gray-400">준비 중...</span>
            </div>
            <div class="text-xs text-gray-500">
                자동 새로고침: 5분마다
            </div>
        </div>
    </div>

    <!-- Loading State -->
    <div id="loadingState" class="hidden max-w-7xl mx-auto px-4 py-12">
        <div class="flex flex-col items-center justify-center">
            <div class="w-16 h-16 border-4 border-blue-600 border-t-transparent rounded-full animate-spin mb-4"></div>
            <p class="text-gray-400 loading-pulse">뉴스를 불러오는 중...</p>
        </div>
    </div>

    <!-- Error State -->
    <div id="errorState" class="hidden max-w-7xl mx-auto px-4 py-12">
        <div class="bg-red-900/20 border border-red-800 rounded-lg p-6 text-center">
            <p class="text-red-400 mb-2">❌ 오류가 발생했습니다</p>
            <p id="errorMessage" class="text-gray-400 text-sm"></p>
        </div>
    </div>

    <!-- News Grid -->
    <main id="newsGrid" class="max-w-7xl mx-auto px-4 py-6">
        <div id="newsContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
            <!-- News cards will be inserted here -->
        </div>
        <div id="emptyState" class="hidden text-center py-12">
            <p class="text-gray-500">표시할 뉴스가 없습니다</p>
        </div>
    </main>

    <!-- News Detail Modal -->
    <div id="newsModal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4">
        <div class="modal-backdrop absolute inset-0" onclick="closeModal()"></div>
        <div class="relative bg-gray-800 rounded-xl max-w-3xl w-full max-h-[90vh] overflow-y-auto border border-gray-700 shadow-2xl">
            <button onclick="closeModal()" class="absolute top-4 right-4 text-gray-400 hover:text-white transition-colors">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                </svg>
            </button>
            <div id="modalContent" class="p-6">
                <!-- Modal content will be inserted here -->
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="bg-gray-800 border-t border-gray-700 mt-12">
        <div class="max-w-7xl mx-auto px-4 py-6 text-center text-sm text-gray-500">
            <p>이 뉴스 사이트는 Brave Search API를 사용하여 실시간 뉴스를 제공합니다.</p>
            <p class="mt-1">중복 뉴스는 자동으로 필터링됩니다.</p>
        </div>
    </footer>

    <script src="js/app.js?v=8"></script>
</body>
</html>
